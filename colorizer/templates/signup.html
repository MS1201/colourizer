<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create your AI Image Colorizer account">
    <title>Sign Up | AI Image Colorizer</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <!-- Logo -->
            <div class="auth-logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                    <circle cx="8.5" cy="8.5" r="1.5" />
                    <polyline points="21,15 16,10 5,21" />
                </svg>
                <h1>AI Image Colorizer</h1>
            </div>

            <!-- Welcome Text -->
            <div class="auth-header">
                <h2>Create Account</h2>
                <p>Get started with colorizing images</p>
            </div>

            <!-- Error Message -->
            {% if error %}
            <div class="auth-message error">
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <!-- Signup Form -->
            <form class="auth-form" method="POST" action="/signup">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name" required
                        autocomplete="name" value="{{ request.form.get('name', '') }}">
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required
                        autocomplete="email" value="{{ request.form.get('email', '') }}">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password"
                        placeholder="min. 8 chars, uppercase, lowercase, number" required autocomplete="new-password">
                    <span class="field-hint">At least 8 characters with uppercase, lowercase, and number</span>
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password"
                        placeholder="Confirm your password" required autocomplete="new-password">
                </div>

                <!-- CAPTCHA -->
                <div class="form-group">
                    <label for="captcha">Security Check: What is <strong>{{ captcha_question }}</strong>?</label>
                    <input type="text" id="captcha" name="captcha" placeholder="Enter the answer" required
                        autocomplete="off">
                </div>

                <!-- Terms -->
                <div class="form-options">
                    <label class="checkbox-wrapper">
                        <input type="checkbox" name="terms" required>
                        <span class="checkmark"></span>
                        <span>I agree to the Terms of Service</span>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Create Account</button>
            </form>

            <!-- Footer -->
            <div class="auth-footer">
                <p>Already have an account? <a href="/login">Sign in</a></p>
                <p><a href="/" class="back-link">← Back to Home</a></p>
            </div>
        </div>
    </div>
</body>

</html>
