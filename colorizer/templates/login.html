<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to AI Image Colorizer">
    <title>Login | AI Image Colorizer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <!-- Logo -->
            <div class="auth-logo">
                <!-- Colorizer palette icon - NOT the broken-image SVG -->
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/>
                    <circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/>
                    <circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/>
                    <circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/>
                    <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/>
                </svg>
                <h1>AI Image Colorizer</h1>
            </div>

            <!-- Welcome Text -->
            <div class="auth-header">
                <h2>Welcome back</h2>
                <p>Sign in to continue</p>
            </div>

            <!-- Error/Success Messages -->
            {% if error %}
            <div class="auth-message error">
                <span>{{ error }}</span>
            </div>
            {% endif %}

            {% if success %}
            <div class="auth-message success">
                <span>{{ success }}</span>
            </div>
            {% endif %}

            <!-- Login Form -->
            <form class="auth-form" method="POST" action="/login">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required
                        autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required
                        autocomplete="current-password">
                </div>

                <!-- CAPTCHA -->
                <div class="form-group">
                    <label for="captcha">Security Check: What is <strong>{{ captcha_question }}</strong>?</label>
                    <input type="text" id="captcha" name="captcha" placeholder="Enter the answer" required
                        autocomplete="off">
                </div>

                <div class="form-options">
                    <label class="checkbox-wrapper">
                        <input type="checkbox" name="remember" value="1">
                        <span class="checkmark"></span>
                        <span>Remember me</span>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Sign In</button>
            </form>

            <!-- Footer -->
            <div class="auth-footer">
                <p>Don't have an account? <a href="/signup">Create one</a></p>
                <p><a href="/" class="back-link">← Back to Home</a></p>
            </div>
        </div>
    </div>
</body>

</html>
